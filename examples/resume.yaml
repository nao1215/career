  self_pr:
    ja: |
      ユーザー体験とパフォーマンスにこだわり、設計から運用までを一人称で完遂することを
      得意としています。

      テックリードとして、技術的な意思決定とメンバーの育成の双方に責任を持ち、チームの
      アウトプットを最大化することを重視しています。継続的な学習を信条としています。
    en: |
      I care deeply about user experience and performance, and I own work from
