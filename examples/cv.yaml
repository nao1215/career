# Example for the English CV template (all data is fictional).
#
#   career generate examples/cv.yaml --template cv --output cv.pdf
#
# The cv template reads `profile`, `education`, and the `career` section. You can
# keep one file per language, or reuse a single file across templates.

# Optional accent color for the cv / career-history templates.
# "" = default slate blue, "none" = monochrome, or any "#rrggbb".
theme:
  accent: "#1f4e79"

profile:
  name: Taro Mihon
  email: taro.mihon@example.com
  phone: "+81 90-1234-5678"
  address:
    text: Tokyo, Japan

education:
  - { year: 2011, month: 4, value: "B.Eng. in Information Engineering, Mihon Institute of Technology" }
  - { year: 2015, month: 3, value: "Graduated, Mihon Institute of Technology" }

career:
  summary: |
    Software engineer with about 10 years of experience, focused on web application
    development. Comfortable across the stack from backend services to cloud
    infrastructure, and an advocate for code review and test automation.

  skills:
    - Backend development in Go and TypeScript (API design and implementation)
    - Cloud infrastructure design and operation on AWS
    - CI/CD pipelines and test automation
    - Driving code and design reviews within a team

  histories:
    - company: CloudTech Inc.
      period: Apr 2020 - Present
      role: Backend Engineer
      summary: Backend development and operation of a SaaS product.
      projects:
        - title: Business management SaaS API
          period: Apr 2020 - Present
          role: Backend (team of 5)
          description: Designed and built REST APIs in Go and operated the AWS infrastructure, improving availability and performance.
          tech: [Go, AWS, PostgreSQL, Terraform]

    - company: SampleSoft Co., Ltd.
      period: Apr 2015 - Mar 2020
      role: Software Engineer
      summary: Web application development for client projects.
      projects:
        - title: E-commerce site development and maintenance
          period: Apr 2015 - Mar 2020
          role: Full-stack
          description: Owned the full cycle from requirements to implementation, testing, and release.
          tech: [TypeScript, Node.js, MySQL]

  certifications:
    - AWS Certified Solutions Architect – Associate
    - Applied Information Technology Engineer (Japan)

  publications:
    - Authored several internal engineering blog posts on backend design
    - Speaker at internal study sessions (test automation, cloud design)
